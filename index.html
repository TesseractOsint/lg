<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #0f0;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #ff0; }
        a { color: #0ff; }
    </style>
</head>
<body>
    <h1>✅ TEST SERVER</h1>
    <p>Total requests: <span id="counter">0</span></p>
    <p><a href="/stats">Statistics</a> | <a href="/big">Download 1MB</a></p>
    
    <script>
        let count = 0;
        setInterval(() => {
            count++;
            document.getElementById('counter').innerText = count;
        }, 1000);
    </script>
</body>
</html>
